openapi: 3.0.0
info:
  title: Finance Data Processing API
  description: Backend API for managing users, roles, financial records, and aggregated dashboard summaries.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                role: { type: string, enum: ['Viewer', 'Analyst', 'Admin'] }
      responses:
        '201':
          description: User registered successfully

  /auth/login:
    post:
      summary: Login and receive a JWT
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: JWT returned successfully

  /records:
    get:
      summary: Get financial records (Paginated & Filtered)
      tags: [Records]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: type
          schema: { type: string, enum: ['Income', 'Expense'] }
      responses:
        '200':
          description: Returns paginated financial records
    post:
      summary: Create a financial record
      tags: [Records]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: number }
                type: { type: string, enum: ['Income', 'Expense'] }
                category: { type: string }
                date: { type: string, format: date }
                notes: { type: string }
      responses:
        '201':
          description: Record created successfully

  /dashboard/summary:
    get:
      summary: Get total income, expenses, and net balance
      tags: [Dashboard]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Returns aggregated summary values
